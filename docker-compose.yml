services:
  db:
    image: postgres:16-alpine
    container_name: app-arch-db
    environment:
      POSTGRES_USER: ${DB_USER:-apparch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apparch}
      POSTGRES_DB: ${DB_NAME:-apparch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./boilerplate/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-apparch} -d ${DB_NAME:-apparch}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./boilerplate/java
      dockerfile: Dockerfile
    container_name: app-arch-backend
    env_file:
      - .env
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-apparch}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-apparch}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-apparch}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app-network
    restart: unless-stopped
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./boilerplate/frontend
      dockerfile: Dockerfile
    container_name: app-arch-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped
    ports:
      - "80:80"

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
