services:
  order-service-java:
    image: app-architecture-java:latest
    build:
      context: ./boilerplate/java/order-service
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/order_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - app-network

  order-service-python:
    image: app-architecture-python:latest
    build:
      context: ./boilerplate/python/order-service/order-service-python
      dockerfile: Dockerfile
    environment:
      - ORDER_SERVICE_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/order_db
      - ORDER_SERVICE_PORT=8080
      - ORDER_SERVICE_DEBUG=false
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/actuator/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - app-network

  postgres:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=order_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  flyway:
    image: flyway/flyway:11-alpine
    volumes:
      - ./boilerplate/java/order-service/src/main/resources/db/migration:/flyway/sql
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:5432/order_db
      - FLYWAY_USER=postgres
      - FLYWAY_PASSWORD=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: app-architecture-frontend:latest
    build:
      context: ./boilerplate/frontend
      dockerfile: Dockerfile
    networks:
      - app-network

networks:
  app-network:

volumes:
  postgres_data:
