ules</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="181.7842" x="783.61" y="367.391">1. Must stay "dumb" &#8212; only</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.6694" x="796.007" y="382.5238">display UI and delegate.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="137.8711" x="783.61" y="397.6566">2. No direct API calls.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="146.2183" x="783.61" y="412.7894">3. Use composition for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="109.897" x="796.007" y="427.9222">shared behavior.</text></g><g class="entity" data-qualified-name="GMN35" data-source-line="88" id="ent0036"><path d="M337.16,679.5813 L337.16,725.9813 L302.57,729.9813 L337.16,733.9813 L337.16,780.3781 A0,0 0 0 0 337.16,780.3781 L518.8446,780.3781 A0,0 0 0 0 518.8446,780.3781 L518.8446,689.5813 L508.8446,679.5813 L337.16,679.5813 A0,0 0 0 0 337.16,679.5813" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M508.8446,679.5813 L508.8446,689.5813 L518.8446,689.5813 L508.8446,679.5813" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="126.4961" x="343.16" y="696.6481">UseCase Facades</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="160.6846" x="343.16" y="711.781">Orchestrate side effects:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="83.2241" x="343.16" y="726.9138">- API request</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="102.394" x="343.16" y="742.0466">- Error mapping</text><text fill="#00000