# Lefthook - Polyglot Git Hook Manager (Root Config)
# Reference: docs/01-agnostic/01-standards/21-validation-harness.md
#
# Each boilerplate owns its own lefthook.yml. Root delegates via extends.
#
# Installation:
#   curl -sSfL https://lefthook.dev/install | bash
#   lefthook install          # Install git hooks
#   lefthook run pre-commit   # Run ALL pre-commit gates
#
# Running from a boilerplate directory:
#   cd boilerplate/reactjs && lefthook run pre-commit  # ReactJS gates only
#
# Skip hooks:
#   SKIP=arch-test git commit  # Skip specific hook
#   git commit --no-verify     # Skip all hooks (emergency only)

extends:
  - boilerplate/reactjs/lefthook.yml
  - boilerplate/nestjs/lefthook.yml
  - boilerplate/java/lefthook.yml
  - boilerplate/python/lefthook.yml
  - boilerplate/quasar/lefthook.yml

# Root-level gates (apply to whole repo, not per-boilerplate)
pre-commit:
  parallel: true
  commands:
    # Gate 8: Rule Coverage Verification
    rules-coverage:
      glob: ".agents.yml"
      run: python3 scripts/verify-rules-covered.py
      require_serial: true
      skip:
        - merge
        - rebase

    # Gate 9: Documentation Links (catch stale refs before push)
    # DISABLED: Too many pre-existing broken links. Run weekly via cron instead.
    # docs-links:
    #   glob: "docs/**/*.md"
    #   run: python3 scripts/validate-docs-links.py
    #   skip:
    #     - merge
    #     - rebase

    # Gate 6: Format (All Languages)
    format-trailing-whitespace:
      glob: "*.{py,java,ts,tsx,vue,js,jsx,md,yaml,yml,json,xml,gradle}"
      run: |
        sed -i '' 's/[[:space:]]*$//' {staged_files} 2>/dev/null || \
        sed -i 's/[[:space:]]*$//' {staged_files}
      skip:
        - merge
        - rebase

    format-end-of-file:
      glob: "*.{py,java,ts,tsx,vue,js,jsx,md,yaml,yml,json,xml,gradle}"
      run: |
        [ -n "$(tail -c1 {staged_files})" ] && echo "" >> {staged_files}
      skip:
        - merge
        - rebase

pre-push:
  parallel: true
  commands:
    # Rule Coverage (re-run in case .agents.yml changed)
    rules-coverage-push:
      run: python3 scripts/verify-rules-covered.py
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    conventional-commit:
      run: |
        if ! grep -qE "^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\([a-z0-9#-]+\))?: .{1,100}" {1}; then
          echo "❌ Invalid commit message format!"
          echo "Expected: type(scope): description"
          echo "Example:  feat(order-service): add payment validation"
          exit 1
        fi
    architecture-evidence:
      run: |
        if ! grep -qi "Architecture:" {1}; then
          echo "❌ Commit message missing architecture compliance evidence!"
          echo "Required: include 'Architecture: PASSED' or 'Architecture: SKIPPED (reason)'"
          exit 1
        fi
