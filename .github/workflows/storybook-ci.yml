name: Storybook CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  storybook-tests:
    name: React Storybook Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: boilerplate/reactjs/package-lock.json
    
    - name: Install dependencies
      working-directory: ./boilerplate/reactjs
      run: npm ci
    
    - name: Build Storybook
      working-directory: ./boilerplate/reactjs
      run: npm run build-storybook
    
    - name: Serve Storybook
      working-directory: ./boilerplate/reactjs
      run: |
        npx http-server ./storybook-static -p 6006 -s &
        sleep 5
    
    - name: Install Playwright Browsers
      working-directory: ./boilerplate/reactjs
      run: npx playwright install --with-deps chromium
    
    - name: Run Playwright Visual Regression Tests
      working-directory: ./boilerplate/reactjs
      run: npx playwright test
    
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: boilerplate/reactjs/playwright-report/
        retention-days: 30
    
    - name: Upload Storybook Build
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: storybook-static
        path: boilerplate/reactjs/storybook-static/
        retention-days: 7

  quasar-storybook-tests:
    name: Quasar Storybook Tests
    runs-on: ubuntu-latest
    needs: storybook-tests
    continue-on-error: true  # Quasar stories still being added
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: boilerplate/quasar/package-lock.json
    
    - name: Install dependencies
      working-directory: ./boilerplate/quasar
      run: npm ci
    
    - name: Build Storybook
      working-directory: ./boilerplate/quasar
      run: npm run build-storybook
    
    - name: Upload Storybook Build
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: quasar-storybook-static
        path: boilerplate/quasar/storybook-static/
        retention-days: 7
