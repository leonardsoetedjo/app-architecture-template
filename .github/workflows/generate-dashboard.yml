name: Generate Architecture Compliance Dashboard

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install jinja2
      
      - name: Collect metrics
        run: |
          python scripts/collect-architecture-metrics.py > metrics.json
        continue-on-error: true
      
      - name: Generate dashboard HTML
        run: |
          python scripts/generate-dashboard.py metrics.json dashboard/index.html
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          keep_files: false
          commit_message: 'chore: update architecture compliance dashboard [skip ci]'
