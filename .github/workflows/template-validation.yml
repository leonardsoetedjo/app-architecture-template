name: Template Validation (Fast)

# Fast compilation gate — runs in <2 minutes.
# Catches compilation/type-check errors before slow Docker builds in smoke-test.yml.
#
# For full integration tests, see: smoke-test.yml, e2e.yml

on:
  pull_request:
    branches: [main]
    paths:
      - 'boilerplate/**'
      - '.env.example'
      - 'docker-compose*.yml'
      - 'scripts/validate-template.sh'
  push:
    branches: [main]
    paths:
      - 'boilerplate/**'
      - '.env.example'
      - 'docker-compose*.yml'
      - 'scripts/validate-template.sh'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'

jobs:
  validate-java:
    name: Java Compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('boilerplate/java/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Validate Java
        run: ./scripts/validate-template.sh --ci --stack=java

  validate-reactjs:
    name: ReactJS TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'boilerplate/reactjs/package-lock.json'
      - name: Validate ReactJS
        run: ./scripts/validate-template.sh --ci --stack=reactjs

  validate-nestjs:
    name: NestJS TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'boilerplate/nestjs/order-service/package-lock.json'
      - name: Validate NestJS
        run: ./scripts/validate-template.sh --ci --stack=nestjs

  validate-docker:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: ./scripts/validate-template.sh --ci --stack=none

  validate-env:
    name: .env.example Completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate env vars
        run: ./scripts/validate-template.sh --ci --stack=none
