name: Template Validation

on:
  push:
    branches: [main]
    paths:
      - 'generators/**'
      - 'scripts/validate-templates.sh'
  pull_request:
    paths:
      - 'generators/**'
      - 'scripts/validate-templates.sh'

jobs:
  unit-test:
    name: Unit Tests (yeoman-test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install generator dependencies
        working-directory: generators
        run: npm ci

      - name: Run generator unit tests
        working-directory: generators
        run: npm test

  integration-java:
    name: Integration — Java Compile
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install generator dependencies
        working-directory: generators
        run: npm ci

      - name: Run template validation (Java)
        run: bash scripts/validate-templates.sh
        env:
          CI: true

  integration-python:
    name: Integration — Python Syntax
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install generator dependencies
        working-directory: generators
        run: npm ci

      - name: Run template validation (Python)
        run: bash scripts/validate-templates.sh
        env:
          CI: true
