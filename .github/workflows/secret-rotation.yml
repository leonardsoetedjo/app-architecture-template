name: Secret Rotation

on:
  schedule:
    - cron: '0 2 1 * *'  # Monthly on 1st at 2 AM UTC
  workflow_dispatch:
    inputs:
      secret_name:
        description: 'Secret to rotate (e.g., JWT_SIGNING_KEY, API_KEY)'
        required: true
        default: 'JWT_SIGNING_KEY'
        type: string

jobs:
  rotate-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate secret name
        run: |
          SECRET_NAME="${{ inputs.secret_name || 'JWT_SIGNING_KEY' }}"
          if [[ ! "$SECRET_NAME" =~ ^[A-Z_]+$ ]]; then
            echo "❌ Invalid secret name format. Must be UPPERCASE_WITH_UNDERSCORES"
            exit 1
          fi
          echo "✅ Secret name valid: $SECRET_NAME"
      
      - name: Rotate secret
        id: rotate
        run: |
          SECRET_NAME="${{ inputs.secret_name || 'JWT_SIGNING_KEY' }}"
          echo "🔄 Rotating secret: $SECRET_NAME"
          
          # Run rotation script
          if [ -f "scripts/rotate-secret.sh" ]; then
            ./scripts/rotate-secret.sh "$SECRET_NAME"
            
            # Extract new version from .env
            NEW_VERSION=$(grep "^${SECRET_NAME}_PRIMARY_VERSION=" .env | cut -d'=' -f2-)
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            
            echo "✅ Rotation complete"
          else
            echo "❌ Rotation script not found"
            exit 1
          fi
      
      - name: Create rotation PR
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: rotate ${{ inputs.secret_name || ''JWT_SIGNING_KEY'' }} (${{ steps.rotate.outputs.new_version }})'
          branch: 'chore/rotate-secrets-${{ inputs.secret_name || ''JWT_SIGNING_KEY'' }}-${{ github.run_id }}'
          delete-branch: true
          title: 'chore: rotate secrets (${{ inputs.secret_name || ''JWT_SIGNING_KEY'' }})'
          body: |
            ## Secret Rotation
            
            **Secret:** ${{ inputs.secret_name || 'JWT_SIGNING_KEY' }}
            **New Version:** ${{ steps.rotate.outputs.new_version }}
            **Rotation Date:** $(date -Iseconds)
            
            ### Changes
            
            - Generated new primary key
            - Promoted previous primary to secondary
            - Updated rotation metadata
            
            ### Grace Period
            
            - **Duration:** 30 days
            - **Previous key valid until:** $(date -d '+30 days' +%Y-%m-%d 2>/dev/null || date -v+30d +%Y-%m-%d)
            
            ### Action Required
            
            - [ ] Review changes (DO NOT commit .env!)
            - [ ] Deploy to staging environment
            - [ ] Validate in staging (monitor for auth failures)
            - [ ] Deploy to production
            - [ ] Monitor for validation failures during grace period
            - [ ] Schedule next rotation in 30 days
            
            ### Deployment Instructions
            
            1. **DO NOT commit .env file** - it contains secrets!
            2. Copy new secret values to your secret manager:
               - AWS Secrets Manager
               - Azure Key Vault
               - HashiCorp Vault
               - GitHub Secrets
            3. Restart applications to load new secrets
            4. Monitor logs for validation failures
            
            ---
            
            *Auto-generated by secret rotation workflow*
            
            **Related:** Issue #86
          labels: |
            chore
            security
            automated-pr
