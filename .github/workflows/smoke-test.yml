name: Smoke Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'boilerplate/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io

jobs:
  smoke-test-nestjs:
    name: NestJS + ReactJS Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Build NestJS Docker image
        working-directory: ./boilerplate/nestjs/order-service
        run: docker build -t order-service-nestjs:latest .

      - name: Build ReactJS Docker image
        working-directory: ./boilerplate/reactjs
        run: docker build -t order-frontend:latest .

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Start services via docker compose
        working-directory: .
        run: |
          docker compose up -d postgres order-service-nestjs nginx
          # Wait for PostgreSQL
          until docker compose exec -T postgres pg_isready -U postgres -d order_db 2>/dev/null; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL ready"
          # Wait for NestJS health endpoint
          until curl -sf http://localhost:8082/health 2>/dev/null; do
            echo "Waiting for NestJS..."
            sleep 2
          done
          echo "NestJS ready"

      - name: Run Bruno smoke tests
        working-directory: ./boilerplate/tests/bruno
        run: bru run --env local
        timeout-minutes: 2

      - name: Run Playwright E2E tests
        working-directory: ./boilerplate/reactjs
        run: |
          npx playwright install chromium
          npx playwright test --project=chromium
        env:
          CI: true
          PLAYWRIGHT_BROWSERS_PATH: /tmp/pw-browsers
        timeout-minutes: 5

      - name: Verify container image freshness
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          CID=$(docker compose ps -q order-service-nestjs | head -1)
          if [ -n "$CID" ]; then
            NAME=$(docker inspect --format='{{.Name}}' "$CID" | sed 's/^\///')
            ./scripts/verify-container-freshness.sh "$NAME" "$COMMIT_SHA" || true
          fi

      - name: Tear down services
        if: always()
        run: docker compose down --volumes

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke-test
          path: ./boilerplate/reactjs/playwright-report/
          retention-days: 7

  smoke-test-java:
    name: Java + ReactJS Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build Java Docker image
        working-directory: ./boilerplate/java/order-service
        run: docker build -t order-service-java:latest .

      - name: Build ReactJS Docker image
        working-directory: ./boilerplate/reactjs
        run: docker build -t order-frontend:latest .

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Start Java services via docker compose
        working-directory: .
        run: |
          docker compose up -d postgres order-service-java nginx
          # Wait for PostgreSQL
          until docker compose exec -T postgres pg_isready -U postgres -d order_db 2>/dev/null; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL ready"
          # Wait for Java health endpoint
          until curl -sf http://localhost:8080/actuator/health 2>/dev/null; do
            echo "Waiting for Java service..."
            sleep 2
          done
          echo "Java service ready"

      - name: Run Bruno smoke tests (Java env)
        working-directory: ./boilerplate/tests/bruno
        run: bru run --env java-local
        timeout-minutes: 2

      - name: Run Playwright E2E tests
        working-directory: ./boilerplate/reactjs
        run: |
          npx playwright install chromium
          npx playwright test --project=chromium
        env:
          CI: true
          PLAYWRIGHT_BROWSERS_PATH: /tmp/pw-browsers
        timeout-minutes: 5

      - name: Verify container image freshness
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          CID=$(docker compose ps -q order-service-java | head -1)
          if [ -n "$CID" ]; then
            NAME=$(docker inspect --format='{{.Name}}' "$CID" | sed 's/^\///')
            ./scripts/verify-container-freshness.sh "$NAME" "$COMMIT_SHA" || true
          fi

      - name: Tear down services
        if: always()
        run: docker compose down --volumes

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke-test-java
          path: ./boilerplate/reactjs/playwright-report/
          retention-days: 7

  contract-validation:
    name: Cross-Stack API Contract Validation
    runs-on: ubuntu-latest
    needs: [smoke-test-nestjs, smoke-test-java]
    if: always() && (needs.smoke-test-nestjs.result == 'success' || needs.smoke-test-java.result == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Start Java backend (reference)
        working-directory: ./boilerplate/java/order-service
        run: |
          docker build -t order-service-java:latest .
          docker compose up -d postgres order-service-java
          until curl -sf http://localhost:8080/actuator/health 2>/dev/null; do
            echo "Waiting for Java..."
            sleep 2
          done

      - name: Capture Java responses
        working-directory: ./boilerplate/tests/bruno
        run: bru run --env java-local > /tmp/java-contract.log 2>&1 || true

      - name: Start NestJS backend (candidate)
        working-directory: ./boilerplate/nestjs/order-service
        run: |
          docker build -t order-service-nestjs:latest .
          docker compose up -d order-service-nestjs
          until curl -sf http://localhost:8082/health 2>/dev/null; do
            echo "Waiting for NestJS..."
            sleep 2
          done

      - name: Capture NestJS responses
        working-directory: ./boilerplate/tests/bruno
        run: bru run --env local > /tmp/nestjs-contract.log 2>&1 || true

      - name: Compare contract shapes
        run: |
          echo "=== Java contract output ==="
          cat /tmp/java-contract.log
          echo ""
          echo "=== NestJS contract output ==="
          cat /tmp/nestjs-contract.log
          echo ""
          if grep -q "FAIL" /tmp/java-contract.log || grep -q "FAIL" /tmp/nestjs-contract.log; then
            echo "::error::Contract validation failed — one or more backends returned errors"
            exit 1
          fi
          echo "PASS: Both backends pass Bruno contract assertions"

      - name: Tear down services
        if: always()
        run: docker compose down --volumes