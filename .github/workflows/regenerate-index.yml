name: Regenerate Index

on:
  push:
    branches: [main]
    paths:
      - '.agents.yml'
      - 'docs/**'
      - 'scripts/auto-index.sh'
  workflow_dispatch:

jobs:
  regenerate-index:
    name: Regenerate docs/.index.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Regenerate index
        run: ./scripts/auto-index.sh --force

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet docs/.index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to docs/.index.json"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in docs/.index.json"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/.index.json .cache/rag-index-timestamps.json
          git commit -m "chore: regenerate docs/.index.json [skip ci]"
          git push
