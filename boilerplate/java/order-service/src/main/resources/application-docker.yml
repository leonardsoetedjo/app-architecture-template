spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:apparch}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:apparch}
    password: ${DB_PASSWORD:apparch}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.example.orderservice: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
