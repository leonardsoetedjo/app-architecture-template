# Server Configuration
server.port=8080

# Application Name
spring.application.name=order-service

# Database Configuration - Platform Independent
# To change databases, update these properties:
#   PostgreSQL: spring.datasource.url=jdbc:postgresql://localhost:5432/order_db
#   MySQL:      spring.datasource.url=jdbc:mysql://localhost:3306/order_db
#   Oracle:     spring.datasource.url=jdbc:oracle:thin:@localhost:1521:orderdb
#   MSSQL:      spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=order_db
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/order-service}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA / Hibernate Configuration - Auto-detects dialect from connection
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=${HIBERNATE_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:}
spring.jpa.properties.hibernate.format_sql=true

# Database-specific dialect hints (uncomment and set for production):
# PostgreSQL:  spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# MySQL:       spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Oracle:      spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
# MSSQL:       spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# H2 Console (for development)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.orderservice=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %traceId - [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %traceId - [%thread] %-5level %logger{36} - %msg%n

# Log file
logging.file.name=logs/order-service.log

# Redis Configuration
# Default: redis:6379 (Docker network)
# Standalone: localhost:6379
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=0
spring.data.redis.timeout=5000ms

# Lettuce connection pool
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# Cache default TTL (30 minutes)
app.cache.default-ttl-minutes=30
