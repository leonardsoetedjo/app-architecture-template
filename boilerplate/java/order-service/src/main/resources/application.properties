# Server Configuration
server.port=8080

# Application Name
spring.application.name=order-service

# Database Configuration - PostgreSQL (production parity)
# Override via DATABASE_URL environment variable for different environments
#
# Examples for other databases (uncomment and update as needed):
#   PostgreSQL (default): spring.datasource.url=jdbc:postgresql://localhost:5432/order_db
#   MySQL:      spring.datasource.url=jdbc:mysql://localhost:3306/order_db
#   Oracle:     spring.datasource.url=jdbc:oracle:thin:@localhost:1521:orderdb
#   MSSQL:      spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=order_db
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/order_db}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# H2 (local dev only - not recommended)
# spring.datasource.url=jdbc:h2:file:./data/order-service
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# JPA / Hibernate Configuration - Auto-detects dialect from connection
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=${HIBERNATE_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:}
spring.jpa.properties.hibernate.format_sql=true

# Database-specific dialect hints (uncomment and set for production):
# PostgreSQL:  spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# MySQL:       spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Oracle:      spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
# MSSQL:       spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# H2 Console (disabled - PostgreSQL only per DDD-DATABASE-001)
# spring.h2.console.enabled=false
# spring.h2.console.path=/h2-console

# Logging — configured via log4j2-spring.xml (ndjson, MDC, Log4j2)
# Do NOT add logging.pattern.* or logging.file.* here — those are Logback-only.
logging.level.root=INFO
logging.level.com.example.orderservice=DEBUG

# Redis Configuration
# Default: redis:6379 (Docker network)
# Standalone: localhost:6379
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=0
spring.data.redis.timeout=5000ms

# Lettuce connection pool
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# Cache default TTL (30 minutes)
app.cache.default-ttl-minutes=30
