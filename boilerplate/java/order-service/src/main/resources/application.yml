spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orders-db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    com.example.orderservice: DEBUG

management:
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true


springdoc:
  api-docs:
    path: /api/v1/docs
  swagger-ui:
    path: /api/v1/swagger-ui.html
    operationsSorter: method
