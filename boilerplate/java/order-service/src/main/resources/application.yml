spring:
  application:
    name: order-service
  datasource:
    # PostgreSQL default (production parity per DDD-DATABASE-001)
    # Override via DATABASE_URL for different environments
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/order_db}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:validate}
    show-sql: ${HIBERNATE_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
  # H2 console disabled per DDD-DATABASE-001 (PostgreSQL only)
  # h2:
  #   console:
  #     enabled: false
  #     path: /h2-console

server:
  port: 8080

logging:
  level:
    com.example.orderservice: DEBUG

management:
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true


springdoc:
  api-docs:
    path: /api/v1/docs
  swagger-ui:
    path: /api/v1/swagger-ui.html
    operationsSorter: method
