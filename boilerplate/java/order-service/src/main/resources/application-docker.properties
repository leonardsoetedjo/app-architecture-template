# Docker profile — PostgreSQL DB, no Redis (E2E testing)
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:orderdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:orderuser}
spring.datasource.password=${DB_PASSWORD:orderpass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable Redis auto-config (not needed for E2E)
spring.data.redis.repositories.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6380

# Logging
logging.level.com.example.orderservice=INFO
