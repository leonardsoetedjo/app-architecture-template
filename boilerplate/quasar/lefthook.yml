# Per-boilerplate lefthook: Quasar Clean Architecture
pre-commit:
  parallel: true
  commands:
    architecture:
      run: |
        npx depcruise --validate .dependency-cruiser.js src/
        echo "Architecture: PASSED"
    type-check:
      run: |
        npx vue-tsc --noEmit
        echo "Type: PASSED"
    lint:
      run: |
        npm run lint
        echo "Lint: PASSED"
    test:
      run: |
        npm run test:unit -- --run
        echo "Test: PASSED"
    format:
      run: |
        npx prettier --check "src/**/*.{ts,vue}"
        echo "Format: PASSED"
    # Gate 5a: Frontend config sanity
    config-sanity:
      run: |
        bash ../../scripts/gate-5a-quasar.sh .
        echo "Gate 5a: PASSED"
    # Gate 7: Security scan
    security:
      run: |
        bash ../../scripts/gate-7-security.sh .
        echo "Gate 7: PASSED"

pre-push:
  commands:
    build:
      run: |
        npx quasar build
        echo "Build: PASSED"
