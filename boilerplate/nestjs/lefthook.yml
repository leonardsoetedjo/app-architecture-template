# Per-boilerplate lefthook: NestJS Clean Architecture
pre-commit:
  parallel: true
  commands:
    architecture:
      run: |
        npx depcruise --validate .dependency-cruiser.cjs src/
        echo "Architecture: PASSED"
    type-check:
      run: |
        npx tsc --noEmit
        echo "Type: PASSED"
    lint:
      run: |
        npx eslint "src/**/*.{ts,tsx}"
        echo "Lint: PASSED"
    test:
      run: |
        npm run test:unit -- --run
        echo "Test: PASSED"
    # Gate 7: Security scan
    security:
      run: |
        bash ../../scripts/gate-7-security.sh .
        echo "Gate 7: PASSED"

pre-push:
  commands:
    build:
      run: |
        npm run build
        echo "Build: PASSED"
    # Smoke test (Bruno) — optional, requires running backend
    # Uncomment after setting up docker compose:
    # smoke-test:
    #   run: |
    #     cd ../../tests/bruno && bru run --env local
    #     echo "Smoke: PASSED"
