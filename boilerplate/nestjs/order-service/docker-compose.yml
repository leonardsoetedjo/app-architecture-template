version: "3.8"

services:
  db:
    image: postgres:14-alpine
    container_name: nestjs-order-service-db
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - order-service-net

  redis:
    image: redis:7-alpine
    container_name: nestjs-order-service-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - order-service-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs-order-service-app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/orders
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production-change-me-in-production-change-me-now
      JWT_ACCESS_TOKEN_TTL: 3600
      JWT_REFRESH_TOKEN_TTL: 86400
      PORT: 8080
      NODE_ENV: development
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - order-service-net

volumes:
  pgdata:
  redis-data:

networks:
  order-service-net:
    driver: bridge
