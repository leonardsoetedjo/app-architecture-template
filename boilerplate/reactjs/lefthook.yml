# Per-boilerplate lefthook: ReactJS Clean Architecture
pre-commit:
  parallel: true
  commands:
    architecture:
      run: |
        npm run arch:test
        echo "Architecture: PASSED"
    type-check:
      run: |
        npx tsc --noEmit
        echo "Type: PASSED"
    lint:
      run: |
        npm run lint
        echo "Lint: PASSED"
    test:
      run: |
        npm test -- --run
        echo "Test: PASSED"
    format:
      run: |
        npx prettier --check "src/**/*.{ts,tsx}"
        echo "Format: PASSED"
    # Gate 5a: Frontend config sanity
    config-sanity:
      run: |
        bash ../../scripts/gate-5a-reactjs.sh .
        echo "Gate 5a: PASSED"
    # Gate 7: Security scan
    security:
      run: |
        bash ../../scripts/gate-7-security.sh .
        echo "Gate 7: PASSED"

pre-push:
  commands:
    build:
      run: |
        npm run build
        echo "Build: PASSED"
    # Smoke test (Bruno) — optional, requires running backend
    # Uncomment after setting up docker compose:
    # smoke-test:
    #   run: |
    #     cd ../../tests/bruno && bru run --env local
    #     echo "Smoke: PASSED"
