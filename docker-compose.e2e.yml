services:
  db:
    image: postgres:16-alpine
    container_name: e2e-db
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderuser -d orderdb"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: e2e-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./boilerplate/java
      dockerfile: Dockerfile.backend
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: e2e-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: orderdb
      DB_USER: orderuser
      DB_PASSWORD: orderpass
      SERVER_PORT: 8080
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

  frontend:
    build:
      context: ./boilerplate/reactjs
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        VITE_API_BASE_URL: http://localhost:8080/api/v1
    container_name: e2e-frontend
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  playwright:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    container_name: e2e-playwright
    working_dir: /tests
    environment:
      - FRONTEND_URL=http://frontend:80
      - API_BASE_URL=http://backend:8080
      - CI=true
    volumes:
      - ./boilerplate/reactjs:/tests:ro
      - ./boilerplate/tests/playwright/e2e:/tests/e2e-fullstack:ro
      - playwright-results:/tests/test-results
    depends_on:
      frontend:
        condition: service_healthy
    command: >
      sh -c "npm install -g pnpm &&
             pnpm install @playwright/test &&
             pnpm exec playwright install-deps chromium &&
             pnpm exec playwright test e2e-fullstack --project=chromium"
    networks:
      - default

volumes:
  pgdata:
  playwright-results:
