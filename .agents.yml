# Machine-readable agent configuration for app-architecture-template
# Consuming agents: Hermes, Cursor, Cody, and similar AI coding agents
# For human readers: see docs/AI_NAVIGATION.md for the cheat sheet
version: "1.1"

# -----------------------------------------------------------------------
# AI Engineering Disciplines
# See docs/01-agnostic/01-standards/27-prompt-engineering.md
# See docs/01-agnostic/01-standards/28-context-engineering.md
# See docs/01-agnostic/01-standards/29-harness-engineering.md
# -----------------------------------------------------------------------
ai_engineering:
  prompt_engineering:
    standard: docs/01-agnostic/01-standards/27-prompt-engineering.md
    templates_dir: prompts/
    versioning: semver
  context_engineering:
    standard: docs/01-agnostic/01-standards/28-context-engineering.md
    default_budget:
      system: 5%
      task: 40%
      retrieved: 30%
      working: 20%
      safety: 5%
  harness_engineering:
    standard: docs/01-agnostic/01-standards/29-harness-engineering.md
    lifecycle: [initialize, scaffold, validate, handoff, verify]
    gates: 10

# -----------------------------------------------------------------------
# Skills to auto-load on session start
# -----------------------------------------------------------------------
skills:
  auto_load:
    - architecture-auditing
    - test-driven-development
    - verification-before-completion
  on_demand:
    - systematic-debugging
    - writing-plans
    - requesting-code-review

# -----------------------------------------------------------------------
# MCP servers this agent context expects
# -----------------------------------------------------------------------
mcp_servers:
  - serena
  - context-mode

# -----------------------------------------------------------------------
# Context-Mode source definitions
# These map to ctx_search(source=...) calls in agent instructions.
# See docs/.index.json for the canonical list and paths.
# -----------------------------------------------------------------------
context_sources:
  architecture-docs:
    path: docs/01-agnostic
    extensions: [".md"]
    description: "Standards, ADRs, guidelines, templates"
  sops:
    path: docs/04-sops
    extensions: [".md"]
    description: "Standard Operating Procedures"
  java-boilerplate:
    path: boilerplate/java
    extensions: [".md", ".java", ".xml", ".yml", ".yaml", ".properties"]
    description: "Java Spring Boot Clean Architecture"
  python-boilerplate:
    path: boilerplate/python
    extensions: [".md", ".py", ".toml", ".ini", ".sh"]
    description: "Python FastAPI Clean Architecture"
  frontend-boilerplate:
    path: boilerplate/reactjs
    extensions: [".md", ".ts", ".tsx", ".js", ".json", ".css"]
    description: "ReactJS + TypeScript + Ant Design"
  quasar-boilerplate:
    path: boilerplate/quasar
    extensions: [".md", ".ts", ".vue", ".js", ".json", ".css"]
    description: "Quasar + Vue 3 + TypeScript"
  scripts:
    path: scripts
    extensions: [".sh", ".py"]
    description: "Automation and validation scripts"

# -----------------------------------------------------------------------
# Architecture Rules Registry
# Single source of truth for ALL machine-tracked rules.
# Each rule MUST have a stable id: and MUST be referenced in stack source trees.
# See docs/01-agnostic/01-standards/21-validation-harness.md § Rule Coverage Verification
# -----------------------------------------------------------------------
architecture_rules:
  # --- Domain Purity (framework isolation) ---
  - id: DDD-DOMAIN-PURITY-JAVA
    name: "Domain has zero Spring/JPA/Lombok imports"
    description: "No org.springframework, javax.persistence, lombok in domain/"
    rationale: "Domain logic is framework-agnostic. Coupling to Spring/JPA/Lombok makes testing impossible and prevents stack swaps."
    severity: error
    stacks: [java]
    enforced_by: ArchUnit
    pre_commit_pattern: "^(import)\\s+(org\\.springframework|javax\\.persistence|lombok)"

  - id: DDD-DOMAIN-PURITY-PYTHON
    name: "Domain has zero framework imports"
    description: "No FastAPI/SQLAlchemy/Pydantic in domain/"
    rationale: "Domain logic is framework-agnostic. Coupling to FastAPI/SQLAlchemy/Pydantic makes testing impossible and prevents stack swaps."
    severity: error
    stacks: [python]
    enforced_by: pytest-archon
    pre_commit_pattern: "^(import|from)\\s+(fastapi|sqlalchemy|pydantic)"

  - id: DDD-DOMAIN-PURITY-NESTJS
    name: "Domain has zero NestJS/TypeORM imports"
    description: "No @nestjs/*, typeorm, class-validator in domain/"
    rationale: "Domain logic is framework-agnostic. Coupling to NestJS/TypeORM makes testing impossible and prevents stack swaps."
    severity: error
    stacks: [nestjs]
    enforced_by: dependency-cruiser

  - id: DDD-DOMAIN-PURITY-QUASAR
    name: "Domain types have zero framework imports"
    description: "No Vue/Quasar/Pinia/Axios in features/*/types/"
    rationale: "Domain types (entities, value objects) must be pure TypeScript. Framework coupling leaks into business logic."
    severity: error
    stacks: [quasar]
    enforced_by: dependency-cruiser

  # --- Dependency Injection ---
  - id: DDD-CONSTRUCTOR-INJECTION
    name: "Constructor injection only"
    description: "No field-level autowiring/injection"
    rationale: "Field injection hides dependencies, makes testing harder, and breaks immutability. Constructor injection surfaces all collaborators."
    severity: error
    stacks: [java, nestjs, python]
    enforced_by: ArchUnit / manual review

  # --- DTOs ---
  - id: DDD-DTO-BOUNDARY
    name: "DTOs at every boundary"
    description: "Never expose entities/models to API or DB"
    rationale: "Entities encapsulate domain invariants. Exposing them to external layers violates encapsulation and couples API contracts to internal structure."
    severity: error
    stacks: [java, nestjs, python]
    enforced_by: ArchUnit / code review

  # --- Currency / Money ---
  - id: DDD-CURRENCY-001
    name: "Use precise decimal type for money"
    description: "No float/double/number for currency"
    rationale: "Floating-point arithmetic causes rounding errors in financial calculations. BigDecimal (Java), decimal.Decimal (Python), decimal.js (TS) are exact."
    severity: error
    stacks: [java, nestjs, python]
    enforced_by: code review / type checker

  # --- Database ---
  - id: DDD-DATABASE-001
    name: "Testcontainers for integration tests"
    description: "Use real PostgreSQL in tests (not H2/SQLite)"
    rationale: "H2 and SQLite have different semantics from PostgreSQL (locking, JSON operators, window functions). Tests must verify against production-equivalent behavior."
    severity: error
    stacks: [java, python]
    enforced_by: pytest / JUnit configuration

  # --- Dependency Graph ---
  - id: DDD-DEPENDENCY-CHECK
    name: "dependency-cruiser zero violations"
    description: "npx depcruise --validate must pass"
    rationale: "dependency-cruiser enforces layer boundaries and forbidden imports at the module graph level, complementing compile-time checks."
    severity: error
    stacks: [nestjs, reactjs, quasar]
    enforced_by: dependency-cruiser

  # --- TypeScript / Frontend ---
  - id: TYPESCRIPT-STRICT-001
    name: "Strict typing — no any"
    description: "Every prop/function/variable typed; no any without justification"
    rationale: "any defeats type safety. It propagates silently through call chains, turning compile-time errors into runtime failures."
    severity: error
    stacks: [reactjs, quasar]
    enforced_by: ESLint @typescript-eslint/no-explicit-any

  - id: REACT-HOOKS-ONLY
    name: "Functional components + hooks only"
    description: "No class components"
    rationale: "Class components are harder to test, don't support hooks, and are deprecated in React documentation. Functional components with hooks are the standard."
    severity: error
    stacks: [reactjs]
    enforced_by: ESLint react/prefer-function-component

  - id: REACT-STATE-PATTERN
    name: "Proper state management"
    description: "Zustand (global), useState (local); no prop drilling"
    rationale: "Prop drilling creates tight coupling between distant components. Global state (Zustand/Pinia) decouples producers from consumers."
    severity: error
    stacks: [reactjs, quasar]
    enforced_by: dependency-cruiser / code review

  - id: REACT-UI-PATTERN
    name: "Ant Design over custom CSS"
    description: "Prefer AntD components over bespoke styling"
    rationale: "Custom CSS fragments the design system and makes accessibility audits impossible. AntD provides tested, accessible, themeable components."
    severity: warning
    stacks: [reactjs]
    enforced_by: code review

  - id: REACT-BUSINESS-LOGIC
    name: "Business logic in hooks"
    description: "No business logic in .tsx render"
    rationale: "Components should be pure render functions. Business logic belongs in hooks (coordinators) or use cases (domain), enabling unit testing without DOM."
    severity: error
    stacks: [reactjs]
    enforced_by: code review / ESLint complexity rules

  - id: QUASAR-COMPOSABLE-PATTERN
    name: "Composables orchestrate, components render"
    description: "No business logic in .vue files"
    rationale: "Same as REACT-BUSINESS-LOGIC for Vue. .vue files handle template rendering; composables handle orchestration."
    severity: error
    stacks: [quasar]
    enforced_by: code review

  - id: QUASAR-API-ISOLATION
    name: "API calls in api/ folder"
    description: "No direct HTTP in components"
    rationale: "Direct axios/fetch calls in components create untestable, tightly coupled code. Centralized api/ adapters enable mocking, retries, and auth."
    severity: error
    stacks: [quasar]
    enforced_by: dependency-cruiser / code review
# -----------------------------------------------------------------------
# Forbidden import patterns by layer
# DEPRECATED: These legacy rules were for the old architecture-pre-commit.sh script.
# They are superseded by:
#   - Java: ArchUnit CleanArchitectureRulesTest + MdcHygieneRulesTest + OptimisticLockingRulesTest
#   - Python: pytest tests/archunit/
#   - Frontend: dependency-cruiser --validate
#   - All stacks: lefthook pre-commit gates (Gate 5a, Gate 7)
# Kept as stubs to avoid breaking consumers that reference by ID. Will be removed in v2.0.
# -----------------------------------------------------------------------
forbidden_patterns: []

# -----------------------------------------------------------------------
# Project boilerplate linkage
# Projects consuming this template MUST copy this section into their own
# .agents.yml and fill in the values.
# -----------------------------------------------------------------------
project_defaults:
  # The canonical boilerplate this project was derived from.
  # Agents MUST index this boilerplate and reference it for patterns.
  boilerplate_reference:
    stack: "python"  # java | python | nestjs | reactjs | quasar
    path_relative_to_template: "boilerplate/python"
    repository_url: "https://github.com/leonardsoetedjo/app-architecture-template/tree/main/boilerplate/python"

  # Machine-readable rule ID mapping for this project's stack.
  # Stack variant suffixes (-JAVA, -PYTHON, etc.) are stripped to find
  # the canonical rule in architecture_rules[].
  stack_variant_suffix: "-PYTHON"  # e.g. DDD-DOMAIN-PURITY-PYTHON → DDD-DOMAIN-PURITY

  # Context-mode source labels used by agents for this project.
  # Must map to context_sources[] names above.
  ctx_search_sources:
    - "python-boilerplate"
    - "sops"
    - "architecture-docs"

  # When this project was initialized (ISO 8601).
  # Used by audit agents to flag temporal mismatches:
  # if project_init_date > template_boilerplate_date, the boilerplate
  # did not exist when the project was created.
  project_init_date: "2026-04-20"

  # When the boilerplate was last updated (ISO 8601).
  # Template maintainer fills this. Auto-generated by CI.
  boilerplate_last_updated: "2026-06-19"

# -----------------------------------------------------------------------
# Agent navigation shortcuts
# -----------------------------------------------------------------------
ai_navigation: docs/AI_NAVIGATION.md
index: docs/.index.json

# -----------------------------------------------------------------------
# Pre-commit command
# Agents MUST run this before claiming any task complete.
# -----------------------------------------------------------------------
pre_commit: lefthook run pre-commit

# -----------------------------------------------------------------------
# Quick reference — valid in any stack
# -----------------------------------------------------------------------
rules:
  one_feature_per_session: true
  no_reports_in_repo: true
  temp_files_in_tmp_only: true
  architecture_compliance_before_commit: true
  github_issues_for_tracking: true
